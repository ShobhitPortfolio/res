<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Selector</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: url('download.jpg') center/cover;
  overflow: hidden;
  color: #e5e5e5;
}

/* LOADER */
#loader {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 15px;
  background: rgba(0,0,0,0.6);
  z-index: 9999;
}

.logo {
  font-family: monospace;
  font-size: 20px;
  letter-spacing: 3px;
}

/* WRAPPER */
.wrapper {
  display: flex;
  gap: 20px;
  align-items: center;
}

/* OUTER CARD (NO TRANSFORM HERE) */
.card-shell {
  position: relative;
}

/* INNER CARD (ONLY THIS IS TILTED) */
.card {
  width: 620px;
  max-width: 92vw;
  padding: 60px;
  border-radius: 16px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(30px);
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 25px 60px rgba(0,0,0,0.7);

  position: relative;
  will-change: transform;
  transition: transform 0.15s ease;
}

/* TITLE */
#logoMain {
  font-family: monospace;
  font-size: 30px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 30px;
  letter-spacing: 4px;
}

/* DROPDOWN (NOW OUTSIDE TILTED ELEMENT SAFELY) */
.dropdown {
  position: relative;
  z-index: 1000;
}

.dropdown-btn {
  width: 100%;
  padding: 16px;
  border-radius: 18px;
  background: rgba(255,255,255,0.05);
  border: 2px solid rgba(255,255,255,0.5);
  cursor: pointer;
  font-family: monospace;
  font-size: 18px;
}

.dropdown-content {
  position: absolute;
  top: 110%;
  width: 100%;
  background: rgba(0,0,0,0.92);
  border-radius: 16px;
  display: none;
  z-index: 99999;
}

.dropdown.active .dropdown-content {
  display: block;
}

.dropdown-content div {
  padding: 14px;
  cursor: pointer;
}

.dropdown-content div:hover {
  background: rgba(255,255,255,0.1);
}

/* BUTTON */
.action-btn {
  width: 160px;
  padding: 14px;
  border-radius: 14px;
  background: black;
  color: white;
  border: 1px solid rgba(255,255,255,0.2);
  display: none;
}

/* EDGE GLOW */
.card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 16px;
  padding: 0.6px;
  background: linear-gradient(120deg, #a855f7, #ffffff, #a855f7);
  background-size: 200% 200%;
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;

  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}

.card:hover::before {
  opacity: 1;
  animation: borderFlow 2.5s linear infinite;
}

@keyframes borderFlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* GLOW FOLLOW */
.glow {
  position: absolute;
  inset: 0;
  pointer-events: none;
  border-radius: 16px;
  background: radial-gradient(circle at var(--x, 50%) var(--y, 50%),
    rgba(255,255,255,0.25),
    transparent 60%);
  opacity: 0;
  transition: opacity 0.15s ease;
}

.card:hover .glow {
  opacity: 1;
}

/* MOBILE */
@media (max-width: 768px) {
  .wrapper {
    flex-direction: column;
  }

  .action-btn {
    width: 100%;
  }
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div id="logoLoad" class="logo">RAWAL EDUCATIONAL SOCIETY</div>
  <div id="loadingText" class="logo">Initializing...</div>
</div>

<!-- MAIN -->
<div id="mainContent" class="hidden">

  <div class="wrapper">

    <div class="card-shell">

      <div id="card" class="card">
        <div class="glow"></div>

        <div id="logoMain">RAWAL EDUCATIONAL SOCIETY</div>

        <div class="dropdown" id="dropdown">
          <div class="dropdown-btn" onclick="toggleDropdown()" id="selected">
            Choose School
          </div>

          <div class="dropdown-content">
            <div onclick="selectSchool('https://rawalpublicschool.com','Rawal Public School')">Rawal Public School</div>
            <div onclick="selectSchool('https://rawalinternationalschool.com','Rawal International School')">Rawal International School</div>
            <div onclick="selectSchool('https://rawalbsk.com','Rawal BSK School')">Rawal BSK School</div>
            <div onclick="selectSchool('https://rawalconventschool.com','Rawal Convent School')">Rawal Convent School</div>
          </div>
        </div>

      </div>

    </div>

    <button class="action-btn" onclick="visitSchool()">VISIT</button>

  </div>

</div>

<script>
const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";
let selectedUrl = "";

/* FAST HACKER TEXT */
function hackerText(el, text, duration = 1200) {
  let start = Date.now();

  function run() {
    let p = (Date.now() - start) / duration;
    let i = p * text.length;

    el.innerText = text.split("").map((c, idx) =>
      idx < i ? text[idx] : chars[Math.floor(Math.random()*chars.length)]
    ).join("");

    if (p < 1) requestAnimationFrame(run);
    else el.innerText = text;
  }
  run();
}

/* LOADER */
setTimeout(() => {
  hackerText(document.getElementById("logoLoad"), "RAWAL EDUCATIONAL SOCIETY", 1300);
  hackerText(document.getElementById("loadingText"), "LOADING COMPLETE", 1300);
}, 500);

setTimeout(() => {
  document.getElementById('loader').style.display = 'none';
  document.getElementById('mainContent').classList.remove('hidden');
}, 2200);

/* DROPDOWN */
function toggleDropdown() {
  document.getElementById('dropdown').classList.toggle('active');
}

/* SELECT */
function selectSchool(url, name) {
  selectedUrl = url;
  document.getElementById('selected').innerText = name;
  document.getElementById('dropdown').classList.remove('active');
  document.querySelector('.action-btn').style.display = 'block';
}

/* VISIT */
function visitSchool() {
  if (!selectedUrl) return alert("Select school first");
  window.location.href = selectedUrl;
}

/* TILT */
const card = document.getElementById('card');
const glow = document.querySelector('.glow');

let mx = 0, my = 0, cx = 0, cy = 0, raf;

card.addEventListener('mousemove', (e) => {
  const r = card.getBoundingClientRect();

  mx = e.clientX - r.left;
  my = e.clientY - r.top;

  card.style.setProperty('--x', `${(mx/r.width)*100}%`);
  card.style.setProperty('--y', `${(my/r.height)*100}%`);

  if (!raf) animate();
});

function animate() {
  raf = requestAnimationFrame(animate);

  cx += (mx - cx) * 0.12;
  cy += (my - cy) * 0.12;

  const r = card.getBoundingClientRect();

  const rx = (cy/r.height - 0.5) * 8;
  const ry = (cx/r.width - 0.5) * 8;

  card.style.transform =
    `perspective(1000px) rotateX(${rx}deg) rotateY(${ry}deg) scale(1.03)`;
}

card.addEventListener('mouseleave', () => {
  cancelAnimationFrame(raf);
  raf = null;

  card.style.transform =
    `perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)`;
});
</script>

</body>
</html>
