<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Selector</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  color: #e5e5e5;
}

/* VIDEO */
.video-bg {
  position: fixed;
  inset: 0;
  z-index: -2;
}
.video-bg video {
  width: 100vw;
  height: 100vh;
  object-fit: cover;
}

/* OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: -1;
}

/* LOADER */
#loader {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 16px;
  background: rgba(0,0,0,0.95);
  z-index: 9999;
}

/* HACK TEXT */
#hackText {
  font-family: monospace;
  font-size: 18px;
  letter-spacing: 2px;
}

/* SPINNER */
.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid rgba(255,255,255,0.2);
  border-top: 3px solid white;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

/* WRAPPER */
.wrapper {
  display: flex;
  gap: 20px;
  align-items: center;
}

/* CARD */
.card {
  width: 620px;
  max-width: 92vw;
  padding: 60px;
  border-radius: 16px;
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(40px);
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 25px 60px rgba(0,0,0,0.7);
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.1s ease;
}

/* EDGE GLOW */
.card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 16px;
  padding: 0.6px;
  background: linear-gradient(120deg, #a855f7, #ffffff, #a855f7);
  background-size: 200% 200%;
  opacity: 0;
  transition: 0.3s;
  pointer-events: none;

  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}

.card:hover::before {
  opacity: 1;
  animation: borderFlow 2.5s linear infinite;
}

@keyframes borderFlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* GLOW FOLLOW */
.glow {
  position: absolute;
  inset: 0;
  border-radius: 16px;
  pointer-events: none;
  background: radial-gradient(circle at var(--x, 50%) var(--y, 50%),
    rgba(255,255,255,0.20),
    transparent 60%);
  opacity: 0;
  transition: 0.15s;
}
.card:hover .glow {
  opacity: 1;
}

/* TITLE */
#logoMain {
  font-family: monospace;
  font-size: 30px;
  text-align: center;
  margin-bottom: 30px;
}

/* DROPDOWN */
.dropdown {
  position: relative;
}
.dropdown-btn {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.25);
  cursor: pointer;
}
.dropdown-content {
  position: absolute;
  top: 110%;
  width: 100%;
  background: rgba(0,0,0,0.9);
  border-radius: 14px;
  opacity: 0;
  transform: translateY(-10px);
  pointer-events: none;
  transition: 0.25s;
  z-index: 10;
}
.dropdown.active .dropdown-content {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.dropdown-content div {
  padding: 14px;
  cursor: pointer;
}
.dropdown-content div:hover {
  background: rgba(255,255,255,0.08);
}

/* BUTTON */
.action-btn {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  background: black;
  color: white;
  border: 1px solid rgba(255,255,255,0.2);
  display: none;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="video-bg">
  <video autoplay muted loop playsinline>
    <source src="rawalbgvideo.mp4" type="video/mp4">
  </video>
</div>

<div class="overlay"></div>

<!-- LOADER -->
<div id="loader">
  <div id="hackText"></div>
  <div class="spinner"></div>
</div>

<!-- MAIN -->
<div id="mainContent" class="hidden">
  <div class="wrapper">

    <div class="card" id="card">
      <div class="glow"></div>

      <div id="logoMain">RAWAL EDUCATIONAL SOCIETY</div>

      <div class="dropdown" id="dropdown">
        <div class="dropdown-btn" onclick="toggleDropdown()" id="selected">
          Choose School
        </div>

        <div class="dropdown-content">
          <div onclick="selectSchool('https://rawalpublicschool.com','Rawal Public School')">Rawal Public School</div>
          <div onclick="selectSchool('https://rawalinternationalschool.com','Rawal International School')">Rawal International School</div>
          <div onclick="selectSchool('https://rawalbsk.com','Rawal BSK School')">Rawal BSK School</div>
          <div onclick="selectSchool('https://rawalconventschool.com','Rawal Convent School')">Rawal Convent School</div>
        </div>
      </div>

      <button class="action-btn" onclick="visitSchool()">VISIT</button>
    </div>

  </div>
</div>

<script>
let selectedUrl = "";

/* LOADER (14 sec slower) */
const loader = document.getElementById("loader");
const hackText = document.getElementById("hackText");
const mainContent = document.getElementById("mainContent");

const phrases = [
  "LOADING...",
  "LOADING UI...",
  "INITIALIZING CONTENTS...",
  "LOADED...",
  "WELCOME TO RAWAL EDUCATIONAL SOCIETY"
];

const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&";

let phraseIndex = 0;
let iterations = 0;
let current = phrases[0];

const interval = setInterval(() => {

  hackText.innerText = current
    .split("")
    .map((char, i) => {
      if (i < iterations) return current[i];
      return chars[Math.floor(Math.random() * chars.length)];
    })
    .join("");

  if (iterations < current.length) {
    iterations += 0.25; // 🔥 slower typing
  } else {
    if (phraseIndex < phrases.length - 1) {
      phraseIndex++;
      current = phrases[phraseIndex];
      iterations = 0;
    } else {
      clearInterval(interval);

      loader.style.transition = "opacity 1s ease";
      loader.style.opacity = "0";

      setTimeout(() => {
        loader.style.display = "none";
        mainContent.classList.remove("hidden");
      }, 1000);
    }
  }

}, 60); // 🔥 slower loop


/* DROPDOWN */
function toggleDropdown() {
  document.getElementById('dropdown').classList.toggle('active');
}

function selectSchool(url, name) {
  selectedUrl = url;
  document.getElementById('selected').innerText = name;
  document.querySelector('.action-btn').style.display = 'block';
  document.getElementById('dropdown').classList.remove('active');
}

function visitSchool() {
  if (!selectedUrl) return alert("Select school first");
  window.location.href = selectedUrl;
}

/* TILT EFFECT */
const card = document.getElementById('card');

let mx = 0, my = 0, cx = 0, cy = 0, raf;

card.addEventListener('mousemove', (e) => {
  const r = card.getBoundingClientRect();
  mx = e.clientX - r.left;
  my = e.clientY - r.top;

  card.style.setProperty('--x', (mx/r.width)*100 + "%");
  card.style.setProperty('--y', (my/r.height)*100 + "%");

  if (!raf) animate();
});

function animate() {
  raf = requestAnimationFrame(animate);

  cx += (mx - cx) * 0.12;
  cy += (my - cy) * 0.12;

  const r = card.getBoundingClientRect();
  const rx = (cy/r.height - 0.5) * 8;
  const ry = (cx/r.width - 0.5) * 8;

  card.style.transform =
    `perspective(1000px) rotateX(${rx}deg) rotateY(${ry}deg) scale(1.03)`;
}

card.addEventListener('mouseleave', () => {
  cancelAnimationFrame(raf);
  raf = null;

  card.style.transform =
    `perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)`;
});
</script>

</body>
</html>
